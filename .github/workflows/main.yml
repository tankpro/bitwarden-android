name: Build APK

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew app:assembleStandardDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: bitwarden-debug-apk
          path: app/build/outputs/apk/standard/debug/*.apk
          if-no-files-found: error

      - name: Create SHA256 checksum
        run: |
          cd app/build/outputs/apk/standard/debug
          sha256sum *.apk > checksum-sha256.txt

      - name: Upload checksum
        uses: actions/upload-artifact@v4
        with:
          name: bitwarden-debug-checksum
          path: app/build/outputs/apk/standard/debug/checksum-sha256.txt
